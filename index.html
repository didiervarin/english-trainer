<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --surface2: #1e1e21;
    --border: #2a2a2f;
    --accent: #c8f06e;
    --accent2: #6ef0c8;
    --danger: #f06e6e;
    --warn: #f0c86e;
    --text: #e8e8ea;
    --muted: #6b6b78;
    --radius: 12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 80px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }
  header {
    width: 100%;
    max-width: 720px;
    padding: 36px 0 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    z-index: 1;
    flex-wrap: wrap;
  }
  .logo { font-family: 'Instrument Serif', serif; font-size: 26px; color: var(--accent); letter-spacing: -0.5px; }
  .logo span { color: var(--muted); font-style: italic; font-size: 20px; }
  .stats { margin-left: auto; display: flex; gap: 18px; align-items: center; font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .stat-val { font-size: 15px; color: var(--text); display: block; letter-spacing: 0; text-transform: none; }
  .level-container { width: 100%; max-width: 720px; margin-bottom: 24px; position: relative; z-index: 1; }
  .level-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .level-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 12px; font-size: 10px; letter-spacing: 0.06em; color: var(--accent); }
  .level-track { height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .level-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 2px; transition: width 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .card { width: 100%; max-width: 720px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 36px 40px; position: relative; z-index: 1; overflow: hidden; }
  .card::after { content: ''; position: absolute; top: -60px; right: -60px; width: 200px; height: 200px; background: radial-gradient(circle, rgba(200,240,110,0.04) 0%, transparent 70%); pointer-events: none; }
  .type-tabs { display: flex; gap: 8px; margin-bottom: 30px; }
  .tab { flex: 1; padding: 9px 8px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
  .tab:hover { border-color: var(--accent); color: var(--text); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #0e0e0f; font-weight: 500; }
  .exercise-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .exercise-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .sentence-display { font-family: 'Instrument Serif', serif; font-size: 24px; line-height: 1.5; color: var(--text); margin-bottom: 24px; min-height: 72px; display: flex; align-items: center; }
  .audio-section { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
  .play-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s, opacity 0.15s; flex-shrink: 0; }
  .play-btn:hover { transform: scale(1.08); }
  .play-btn:active { transform: scale(0.95); }
  .play-btn.playing { background: var(--accent2); animation: pulse 1s ease-in-out infinite; }
  .play-btn svg { fill: #0e0e0f; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
  .audio-hint { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .answer-area { position: relative; margin-bottom: 18px; }
  .answer-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; line-height: 1.6; resize: vertical; min-height: 90px; outline: none; transition: border-color 0.2s; }
  .answer-input:focus { border-color: var(--accent); }
  .answer-input.correct { border-color: var(--accent); background: rgba(200,240,110,0.04); }
  .answer-input.incorrect { border-color: var(--danger); background: rgba(240,110,110,0.04); }
  .actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn-primary { padding: 11px 26px; background: var(--accent); border: none; border-radius: 8px; color: #0e0e0f; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; cursor: pointer; letter-spacing: 0.04em; transition: opacity 0.2s, transform 0.15s; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:active { transform: scale(0.97); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-ghost { padding: 11px 18px; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; letter-spacing: 0.04em; transition: border-color 0.2s, color 0.2s; }
  .btn-ghost:hover { border-color: var(--muted); color: var(--text); }
  .feedback { margin-top: 22px; padding: 18px 20px; border-radius: var(--radius); border: 1px solid var(--border); font-size: 13px; line-height: 1.7; display: none; animation: slideUp 0.3s ease; }
  .feedback.visible { display: block; }
  .feedback.correct { border-color: rgba(200,240,110,0.3); background: rgba(200,240,110,0.04); }
  .feedback.incorrect { border-color: rgba(240,110,110,0.3); background: rgba(240,110,110,0.04); }
  .feedback-header { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; font-weight: 500; }
  .feedback.correct .feedback-header { color: var(--accent); }
  .feedback.incorrect .feedback-header { color: var(--danger); }
  .diff-change { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; margin-top: 10px; }
  .diff-change.up { background: rgba(200,240,110,0.1); color: var(--accent); }
  .diff-change.down { background: rgba(240,110,110,0.1); color: var(--danger); }
  .next-container { margin-top: 18px; display: none; }
  .next-container.visible { display: flex; gap: 10px; flex-wrap: wrap; }
  .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(14,14,15,0.3); border-top-color: #0e0e0f; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 5px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .hidden { display: none !important; }
  @media (max-width: 580px) {
    .card { padding: 22px 18px; }
    .sentence-display { font-size: 20px; }
    .stats { gap: 12px; }
    .type-tabs { gap: 5px; }
    .tab { font-size: 10px; padding: 8px 5px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">English<span>trainer</span></div>
  <div class="stats">
    <div><span class="stat-val" id="scoreDisplay">0</span>score</div>
    <div><span class="stat-val" id="streakDisplay">0🔥</span>série</div>
    <div><span class="stat-val" id="sessionDisplay">0</span>exercices</div>
  </div>
</header>

<div class="level-container">
  <div class="level-info">
    <span>Difficulté</span>
    <span class="level-badge" id="levelLabel">A2 — Élémentaire</span>
  </div>
  <div class="level-track"><div class="level-fill" id="levelFill" style="width:20%"></div></div>
</div>

<div class="card">
  <div class="type-tabs">
    <button class="tab active" id="tab1" onclick="switchMode('listen')">🎧 Dictée</button>
    <button class="tab" id="tab2" onclick="switchMode('translate')">🔤 Traduction</button>
    <button class="tab" id="tab3" onclick="switchMode('random')">🎲 Aléatoire</button>
  </div>

  <div class="exercise-label" id="exerciseLabel">Dictée anglaise</div>

  <div id="listenContent">
    <div class="audio-section">
      <button class="play-btn" id="playBtn" onclick="playAudio()" title="Écouter">
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <div class="audio-hint">Écoutez la phrase et écrivez-la en anglais.<br><span style="color:var(--muted);font-size:11px">Ctrl+Entrée pour valider. Cliquez ▶ pour réécouter.</span></div>
    </div>
  </div>

  <div id="translateContent" class="hidden">
    <div class="sentence-display" id="sentenceDisplay">…</div>
  </div>

  <div class="answer-area">
    <textarea class="answer-input" id="answerInput" placeholder="Votre réponse ici…" rows="3" onkeydown="handleKey(event)"></textarea>
  </div>

  <div class="actions">
    <button class="btn-primary" id="submitBtn" onclick="submitAnswer()">Valider</button>
    <button class="btn-ghost" onclick="skipExercise()">Passer</button>
  </div>

  <div class="feedback" id="feedback">
    <div class="feedback-header" id="feedbackHeader"></div>
    <div id="feedbackBody"></div>
    <div id="diffPill"></div>
  </div>

  <div class="next-container" id="nextContainer">
    <button class="btn-primary" onclick="nextExercise()">Suivant →</button>
  </div>
</div>

// LOCAL CORRECTION HELPERS
// ══════════════════════════════════════════════════════════
function normalize(s) {
  return s.toLowerCase()
    .replace(/[''`]/g, "'")
    .replace(/[^a-z0-9\s']/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function similarity(a, b) {
  const na = normalize(a), nb = normalize(b);
  if (na === nb) return 100;
  const wa = na.split(' '), wb = nb.split(' ');
  const hits = wa.filter(w => wb.includes(w)).length;
  return Math.round((hits / Math.max(wa.length, wb.length)) * 100);
}

function wordDiff(correct, student) {
  const wc = correct.split(' '), ws = student.split(' ');
  return wc.map(w => {
    const norm = w.toLowerCase().replace(/[^a-z0-9']/g, '');
    const found = ws.some(sw => sw.toLowerCase().replace(/[^a-z0-9']/g, '') === norm);
    return found ? w : `<strong style="color:var(--accent)">${w}</strong>`;
  }).join(' ');
}

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
const LEVELS = [
  { label:"A1 — Débutant",     fill:5,   key:0 },
  { label:"A2 — Élémentaire",  fill:20,  key:1 },
  { label:"B1 — Intermédiaire",fill:40,  key:2 },
  { label:"B2 — Avancé",       fill:60,  key:3 },
  { label:"C1 — Expert",       fill:80,  key:4 },
  { label:"C2 — Maîtrise",     fill:100, key:5 },
];

let state = {
  level: Math.min(parseInt(localStorage.getItem('et_level') || '1'), 5),
  score: parseInt(localStorage.getItem('et_score') || '0'),
  streak: 0,
  session: 0,
  mode: 'listen',
  currentMode: 'listen',
  currentSentence: '',
  currentFrench: '',
  submitted: false,
  loading: false,
  usedLocal: new Set(),
};

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  updateUI();
  generateExercise();
});

// Preload voices
window.speechSynthesis.onvoiceschanged = () => {};

// ══════════════════════════════════════════════════════════
// MODE
// ══════════════════════════════════════════════════════════
function switchMode(mode) {
  state.mode = mode;
  ['tab1','tab2','tab3'].forEach((id, i) => {
    document.getElementById(id).classList.toggle('active', ['listen','translate','random'][i] === mode);
  });
  generateExercise();
}

function getEffectiveMode() {
  return state.mode === 'random' ? (Math.random() < 0.5 ? 'listen' : 'translate') : state.mode;
}

// ══════════════════════════════════════════════════════════
// GENERATE
// ══════════════════════════════════════════════════════════
async function generateExercise() {
  if (state.loading) return;
  state.loading = true;
  state.submitted = false;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Chargement…';

  hideFeedback();
  document.getElementById('nextContainer').classList.remove('visible');
  document.getElementById('answerInput').value = '';
  document.getElementById('answerInput').className = 'answer-input';
  document.getElementById('answerInput').disabled = false;

  const em = getEffectiveMode();
  state.currentMode = em;

  document.getElementById('listenContent').classList.toggle('hidden', em !== 'listen');
  document.getElementById('translateContent').classList.toggle('hidden', em !== 'translate');
  document.getElementById('exerciseLabel').textContent =
    em === 'listen' ? '🎧 Écrivez la phrase que vous entendez' : '🔤 Traduisez en anglais';

  generateFromBank(em);

  if (em === 'listen') {
    document.getElementById('playBtn').classList.remove('playing');
    setTimeout(() => speakText(state.currentSentence), 350);
  } else {
    document.getElementById('sentenceDisplay').textContent = state.currentFrench;
  }

  btn.disabled = false;
  btn.textContent = 'Valider';
  document.getElementById('answerInput').focus();
  state.loading = false;
}

function generateFromBank(mode) {
  const levelKey = LEVELS[state.level].key;
  const pool = BANK[levelKey] || BANK[1];
  // Avoid repeating recent sentences
  const available = pool.filter((_, i) => !state.usedLocal.has(`${levelKey}-${i}`));
  const list = available.length > 0 ? available : pool;
  const idx = Math.floor(Math.random() * list.length);
  const item = list[idx];
  // Track used (reset when all used)
  const realIdx = pool.indexOf(item);
  state.usedLocal.add(`${levelKey}-${realIdx}`);
  if (state.usedLocal.size > pool.length * 0.8) state.usedLocal.clear();

  state.currentSentence = item.en;
  state.currentFrench = item.fr;
}

// ══════════════════════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════════════════════
function playAudio() { if (state.currentSentence) speakText(state.currentSentence); }

function speakText(text) {
  const btn = document.getElementById('playBtn');
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-GB';
  utt.rate = [0.75, 0.82, 0.9, 0.95, 1.0, 1.0][state.level];
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => v.lang === 'en-GB' && v.name.includes('Google'))
    || voices.find(v => v.lang.startsWith('en-GB'))
    || voices.find(v => v.lang.startsWith('en'));
  if (preferred) utt.voice = preferred;
  btn.classList.add('playing');
  utt.onend = utt.onerror = () => btn.classList.remove('playing');
  window.speechSynthesis.speak(utt);
}

// ══════════════════════════════════════════════════════════
// SUBMIT
// ══════════════════════════════════════════════════════════
function handleKey(e) { if (e.key === 'Enter' && e.ctrlKey) submitAnswer(); }

async function submitAnswer() {
  if (state.submitted || state.loading) return;
  const answer = document.getElementById('answerInput').value.trim();
  if (!answer) { document.getElementById('answerInput').focus(); return; }

  state.submitted = true;
  state.session++;
  document.getElementById('answerInput').disabled = true;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Correction…';

  const score = similarity(state.currentSentence, answer);
  const isCorrect = score >= 68;

  // Show feedback locally (fast)
  showFeedback(isCorrect, score, answer);
  updateScore(isCorrect);

  btn.textContent = 'Valider';
  document.getElementById('nextContainer').classList.add('visible');
}

function showFeedback(isCorrect, score, answer) {
  const fb = document.getElementById('feedback');
  fb.className = `feedback visible ${isCorrect ? 'correct' : 'incorrect'}`;
  document.getElementById('answerInput').classList.add(isCorrect ? 'correct' : 'incorrect');

  document.getElementById('feedbackHeader').textContent = isCorrect
    ? `✓ Correct ! (${score}/100)`
    : `✗ À revoir (${score}/100)`;

  const corrected = wordDiff(state.currentSentence, answer);
  document.getElementById('feedbackBody').innerHTML = isCorrect
    ? `<span style="color:var(--muted)">Bonne réponse !</span>`
    : `<div style="color:var(--muted);margin-bottom:6px">Les mots manquants ou incorrects sont <strong style="color:var(--accent)">surlignés</strong> :</div><div>${corrected}</div>`;
}

function updateScore(isCorrect) {
  if (isCorrect) {
    state.score += 10 + state.level * 5;
    state.streak++;
    if (state.streak >= 3 && state.level < 5) {
      state.level++;
      document.getElementById('diffPill').innerHTML =
        `<div class="diff-change up">↑ Niveau augmenté → ${LEVELS[state.level].label}</div>`;
      state.streak = 0;
    } else {
      document.getElementById('diffPill').innerHTML = '';
    }
  } else {
    state.streak = 0;
    if (state.level > 0) {
      state.level--;
      document.getElementById('diffPill').innerHTML =
        `<div class="diff-change down">↓ Niveau réduit → ${LEVELS[state.level].label}</div>`;
    } else {
      document.getElementById('diffPill').innerHTML = '';
    }
  }
  localStorage.setItem('et_level', state.level);
  localStorage.setItem('et_score', state.score);
  updateUI();
}

function hideFeedback() {
  document.getElementById('feedback').className = 'feedback';
}

function updateUI() {
  const lv = LEVELS[state.level];
  document.getElementById('levelLabel').textContent = lv.label;
  document.getElementById('levelFill').style.width = lv.fill + '%';
  document.getElementById('scoreDisplay').textContent = state.score;
  document.getElementById('streakDisplay').textContent = state.streak + '🔥';
  document.getElementById('sessionDisplay').textContent = state.session;
}

function skipExercise() { state.streak = 0; generateExercise(); }
function nextExercise() { generateExercise(); }


</script>
</body>
</html>
